<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentCLI</title>
<style>
/* ================================================================
   CSS Variables — 暗色/亮色主题
   ================================================================ */
:root, [data-theme="dark"] {
    --bg: #080C14; --bg-deep: #050810; --surface: #111827;
    --surface-alt: #151F35; --surface-light: #1E2A42; --surface-hover: #253150;
    --primary: #3B82F6; --primary-hover: #2563EB; --primary-press: #1D4ED8;
    --success: #22C55E; --success-hover: #16A34A; --success-press: #15803D;
    --warning: #F59E0B; --danger: #EF4444; --info: #06B6D4;
    --text: #F1F5F9; --text-sub: #CBD5E1; --text-secondary: #94A3B8;
    --text-muted: #64748B; --text-dim: #475569;
    --border: #1E2A42; --border-light: #2D3B55; --border-focus: #3B82F6;
    --row-hover: #1A2744; --row-selected: #1E3A5F;
    --row-even: #111B2E; --row-odd: #0C1525;
    --input-bg: #080C14; --input-border: #2D3B55;
    --scrollbar-bg: #111827; --scrollbar-thumb: #1E2A42;
}
[data-theme="light"] {
    --bg: #F1F5F9; --bg-deep: #E2E8F0; --surface: #FFFFFF;
    --surface-alt: #F8FAFC; --surface-light: #E2E8F0; --surface-hover: #CBD5E1;
    --primary: #3B82F6; --primary-hover: #2563EB; --primary-press: #1D4ED8;
    --success: #22C55E; --success-hover: #16A34A; --success-press: #15803D;
    --warning: #F59E0B; --danger: #EF4444; --info: #0891B2;
    --text: #1E293B; --text-sub: #334155; --text-secondary: #475569;
    --text-muted: #64748B; --text-dim: #94A3B8;
    --border: #CBD5E1; --border-light: #E2E8F0; --border-focus: #3B82F6;
    --row-hover: #E2E8F0; --row-selected: #DBEAFE;
    --row-even: #FFFFFF; --row-odd: #F8FAFC;
    --input-bg: #FFFFFF; --input-border: #CBD5E1;
    --scrollbar-bg: #F1F5F9; --scrollbar-thumb: #CBD5E1;
}

/* ================================================================
   Reset & Base
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
    font-size: 14px; color: var(--text);
    background: var(--bg-deep);
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none;
}

/* ================================================================
   Header
   ================================================================ */
#header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--surface);
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
}
#header .logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--primary), #8B5CF6);
    flex-shrink: 0;
}
#header .title {
    font-size: 16px; font-weight: 700; color: var(--text);
    margin-right: auto;
}
.tab-bar {
    display: flex; gap: 0; background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 2px;
}
.tab-bar button {
    border: 1px solid transparent; background: transparent; color: var(--text-muted);
    font: inherit; font-size: 12px; font-weight: 600;
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    transition: all .15s; white-space: nowrap;
}
.tab-bar button.active {
    background: var(--primary); color: #fff; font-weight: 700;
    border-color: var(--primary); box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.tab-bar button:hover:not(.active) {
    color: var(--text); background: var(--surface-hover);
    border-color: var(--border-light);
}
#wt-btn {
    border: none; background: var(--surface-light); color: var(--text-secondary);
    font: inherit; font-size: 11px; padding: 5px 12px; border-radius: 6px;
    cursor: pointer; transition: all .15s; white-space: nowrap;
}
#wt-btn:hover { background: var(--surface-hover); color: var(--text); }
#settings-btn {
    border: none; background: transparent; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
#settings-btn:hover { background: var(--surface-hover); color: var(--text); }

/* ================================================================
   Toolbar
   ================================================================ */
#toolbar {
    display: flex; flex-direction: column; gap: 4px;
    padding: 6px 14px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}
#toolbar .tb-btn {
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font: inherit; font-size: 12px;
    padding: 6px 14px; border-radius: 6px; cursor: pointer;
    transition: all .15s; white-space: nowrap;
}
#toolbar .tb-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-light); }
#toolbar .tb-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); font-weight: 600; }
#toolbar .tb-btn.primary:hover { background: var(--primary-hover); }
#toolbar .tb-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
#tb-separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

/* Search */
#search-wrap {
    position: relative; flex: 1; max-width: 260px; margin-left: auto;
}
#search-wrap input {
    width: 100%; border: 1px solid var(--input-border); background: var(--input-bg);
    color: var(--text); font: inherit; font-size: 13px;
    padding: 7px 10px 7px 30px; border-radius: 6px;
    outline: none; transition: border-color .15s;
}
#search-wrap input:focus { border-color: var(--border-focus); }
#search-wrap .search-icon {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
}

/* ================================================================
   Table
   ================================================================ */
#table-container {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    margin: 0 10px 10px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface);
}
#table-container::-webkit-scrollbar { width: 8px; }
#table-container::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
#table-container::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

table {
    width: 100%; table-layout: fixed; border-collapse: collapse;
}
thead { position: sticky; top: 0; z-index: 10; }
thead th {
    background: var(--surface-light); color: var(--text-muted);
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
thead th:first-child { border-radius: 8px 0 0 0; }
thead th:last-child { border-radius: 0 8px 0 0; }

/* Column widths — 4 cols */
th:nth-child(1), td:nth-child(1) { width: 16%; }
th:nth-child(2), td:nth-child(2) { width: 28%; }
th:nth-child(3), td:nth-child(3) { width: 30%; }
th:nth-child(4), td:nth-child(4) { width: 26%; }

td {
    padding: 10px 14px; font-size: 13px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
tr:nth-child(even) td { background: var(--row-even); }
tr:nth-child(odd) td { background: var(--row-odd); }
tr.selected td { background: var(--row-selected) !important; }
tr:hover td { background: var(--row-hover); }

td .cmd-text {
    font-family: "Consolas", "Cascadia Code", monospace;
    font-size: 11px; color: var(--text-sub);
}
td .config-btns { display: flex; gap: 6px; flex-wrap: wrap; }
td .config-btns button {
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font: inherit; font-size: 11px;
    padding: 4px 12px; border-radius: 4px; cursor: pointer;
    transition: all .12s; white-space: nowrap;
}
td .config-btns button:hover { background: var(--surface-hover); color: var(--text); }

/* ================================================================
   Empty State
   ================================================================ */
#empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 8px;
    color: var(--text-dim); padding: 40px;
}
#empty-state .icon { font-size: 40px; }
#empty-state .msg { font-size: 13px; }
#empty-state.hidden { display: none; }

/* ================================================================
   Dialog / Modal
   ================================================================ */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
}
.modal-overlay.hidden { display: none; }
.modal {
    background: var(--surface); border: 1px solid var(--border-light);
    border-radius: 12px; width: 700px; max-height: 82%;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.modal-header {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 700;
}
.modal-header .close {
    margin-left: auto; border: none; background: transparent;
    color: var(--text-muted); font-size: 16px; cursor: pointer;
    padding: 2px 6px; border-radius: 4px;
}
.modal-header .close:hover { background: var(--surface-hover); color: var(--text); }
.modal-body { padding: 14px 16px; overflow-y: auto; flex: 1; }
.modal-body::-webkit-scrollbar { width: 6px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
.modal-footer {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 10px 16px; border-top: 1px solid var(--border);
}
.modal-footer button {
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font: inherit; font-size: 12px;
    padding: 6px 18px; border-radius: 6px; cursor: pointer;
}
.modal-footer button:hover { background: var(--surface-hover); color: var(--text); }
.modal-footer button.primary {
    background: var(--primary); color: #fff; border-color: var(--primary);
    font-weight: 600;
}
.modal-footer button.primary:hover { background: var(--primary-hover); }

/* Dialog form */
.form-row {
    display: flex; gap: 12px; margin-bottom: 10px;
}
.form-row label { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap;
    display: flex; align-items: center; min-width: fit-content; }
.form-row input {
    flex: 1; border: 1px solid var(--input-border); background: var(--input-bg);
    color: var(--text); font: inherit; font-size: 13px;
    padding: 8px 12px; border-radius: 6px; outline: none;
}
.form-row input:focus { border-color: var(--border-focus); }

/* Agent install table in dialog */
.install-table {
    width: 100%; border-collapse: collapse; table-layout: fixed;
}
.install-table thead th {
    background: var(--surface-light); color: var(--text-muted);
    font-size: 10px; font-weight: 700; padding: 6px 8px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1;
}
.install-table td {
    padding: 6px 10px; font-size: 12px; border-bottom: 1px solid var(--border);
}
.install-table tr:nth-child(even) td { background: var(--row-even); }
.install-table tr:nth-child(odd) td { background: var(--row-odd); }
.install-table td .btn-group { display: flex; gap: 3px; flex-wrap: wrap; }
.install-table td .btn-group button {
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font: inherit; font-size: 11px;
    padding: 4px 0; border-radius: 4px; cursor: pointer;
    white-space: nowrap; transition: all .12s;
    width: 62px; text-align: center;
}
.install-table td .btn-group button:hover { background: var(--surface-hover); color: var(--text); }
.install-table td .btn-group button.install-official { background: var(--primary); color: #fff; border-color: var(--primary); }
.install-table td .btn-group button.install-mirror { background: var(--success); color: #fff; border-color: var(--success); }
.install-table td .status-ok { color: var(--success); font-weight: 600; }
.install-table td .status-no { color: var(--danger); font-weight: 600; }

/* Settings form */
.settings-group { margin-bottom: 14px; }
.settings-group h3 { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.settings-group select, .settings-group button {
    border: 1px solid var(--input-border); background: var(--input-bg);
    color: var(--text); font: inherit; font-size: 12px;
    padding: 6px 10px; border-radius: 6px; cursor: pointer;
    width: 100%;
}

/* Toast */
#toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: var(--primary); color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 12px; font-weight: 600;
    opacity: 0; transform: translateY(10px);
    transition: opacity .25s, transform .25s;
    pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
#toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
    <div class="logo"></div>
    <span class="title" id="app-title">AgentCLI</span>
    <button id="settings-btn" onclick="openSettings()" style="display:flex;align-items:center;gap:4px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font:inherit;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all .15s;" onmouseenter="this.style.background='var(--surface-hover)';this.style.color='var(--text)'" onmouseleave="this.style.background='var(--surface)';this.style.color='var(--text-secondary)'">⚙ <span id="settings-text">设置</span></button>
</div>

<!-- Toolbar -->
<div id="toolbar">
    <div style="display:flex; align-items:center; gap:6px;">
        <span style="font-size:12px;color:var(--text-muted);white-space:nowrap;" id="launcher-label">请选择启动方式</span>
        <div class="tab-bar" id="tab-bar">
            <button data-launcher="Windows Terminal" class="active" id="tab-wt">Terminal</button>
            <button data-launcher="PowerShell" id="tab-ps">PowerShell</button>
            <button data-launcher="CMD" id="tab-cmd">CMD</button>
        </div>
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap;margin-left:auto;" id="wt-recommend-label"></span>
        <button id="wt-install-btn" style="display:none;border:1px solid var(--primary);background:transparent;color:var(--primary);font:inherit;font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;white-space:nowrap;" onclick="apiCall('install_wt')"></button>
    </div>
    <div style="display:flex; align-items:center; gap:6px;">
        <button class="tb-btn primary" onclick="openAddDialog()" id="btn-add">添加</button>
        <button class="tb-btn" onclick="openEditDialog()" id="btn-edit">编辑</button>
        <button class="tb-btn danger" onclick="deleteProject()" id="btn-delete">删除</button>
        <span id="tb-separator"></span>
        <button class="tb-btn" onclick="moveUp()" id="btn-up">上移</button>
        <button class="tb-btn" onclick="moveDown()" id="btn-down">下移</button>
        <button class="tb-btn" onclick="doDetect()" id="btn-detect">检测</button>
        <div id="search-wrap" style="margin-left:auto;">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜索项目名称或命令..." oninput="filterProjects()">
        </div>
    </div>
</div>

<!-- Table -->
<div id="table-container">
    <table>
        <thead>
            <tr>
                <th id="th-name">名称</th>
                <th id="th-cmd">启动命令</th>
                <th id="th-config">配置文件</th>
                <th id="th-actions">操作</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>
<div id="empty-state" class="hidden">
    <div class="icon">📂</div>
    <div class="msg" id="empty-msg">点击「添加」按钮开始配置你的智能体</div>
</div>

<!-- Add/Edit Dialog -->
<div class="modal-overlay hidden" id="dlg-project">
    <div class="modal">
        <div class="modal-header">
            <span id="dlg-title">添加项目</span>
            <button class="close" onclick="closeDialog('dlg-project')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <label id="dlg-label-name">名称</label>
                <input type="text" id="dlg-name" placeholder="Agent 名称...">
                <label id="dlg-label-cmd">启动命令</label>
                <input type="text" id="dlg-cmd" placeholder="例如: claude">
            </div>
            <table class="install-table">
                <thead id="install-table-head">
                    <tr>
                        <th style="width:16%">名称</th>
                        <th style="width:10%">方式</th>
                        <th style="width:28%">官方源</th>
                        <th style="width:28%">镜像源</th>
                        <th style="width:18%">状态</th>
                    </tr>
                </thead>
                <tbody id="install-table-body"></tbody>
            </table>
        </div>
        <div class="modal-footer">
            <button id="dlg-btn-cancel" onclick="closeDialog('dlg-project')">取消</button>
            <button class="primary" id="dlg-btn-ok" onclick="saveProject()">确定</button>
        </div>
    </div>
</div>

<!-- Settings Dialog -->
<div class="modal-overlay hidden" id="dlg-settings">
    <div class="modal" style="width: 380px; max-height: 90%;">
        <div class="modal-header">
            <span id="dlg-settings-title">设置</span>
            <button class="close" onclick="closeDialog('dlg-settings')">✕</button>
        </div>
        <div class="modal-body">
            <div class="settings-group">
                <h3 id="settings-h-theme">主题</h3>
                <select id="settings-theme">
                    <option value="dark" id="settings-theme-opt1">深色</option>
                    <option value="light" id="settings-theme-opt2">浅色</option>
                </select>
            </div>
            <div class="settings-group">
                <h3 id="settings-h-lang">语言</h3>
                <select id="settings-lang">
                    <option value="zh" id="settings-lang-opt1">中文</option>
                    <option value="en" id="settings-lang-opt2">English</option>
                </select>
            </div>
            <div class="settings-group">
                <h3 id="settings-h-ver">版本</h3>
                <p style="font-size:12px;color:var(--text-muted);"><span id="settings-ver-label">当前版本: v</span><span id="settings-ver">-</span></p>
                <button id="settings-check-update" onclick="checkUpdate()">检查更新</button>
            </div>
        </div>
        <div class="modal-footer">
            <button id="settings-btn-cancel" onclick="closeDialog('dlg-settings')">取消</button>
            <button class="primary" id="settings-btn-save" onclick="saveSettings()">保存</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ================================================================
// State
// ================================================================
let config = { projects: [], default_launcher: 'Windows Terminal', theme: 'dark', lang: 'zh' };
let selectedIdx = -1;
let editIdx = -1;
let knownAgents = {};
let isWTInstalled = false;

// ================================================================
// API Bridge
// ================================================================
async function apiCall(method, ...args) {
    try {
        if (window.pywebview && window.pywebview.api) {
            return await window.pywebview.api[method](...args);
        }
        // Fallback for testing in browser
        console.log('API call (mock):', method, args);
        return null;
    } catch (e) {
        console.error('API error:', method, e);
        showToast('操作失败: ' + e, 'danger');
        return null;
    }
}

// ================================================================
// Toast
// ================================================================
let toastTimer;
function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = type === 'danger' ? 'var(--danger)' :
                          type === 'success' ? 'var(--success)' :
                          type === 'warning' ? 'var(--warning)' : 'var(--primary)';
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ================================================================
// Theme & i18n Helper
// ================================================================
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
}
function t(key) {
    // Simple i18n — backend provides translated strings via apiCall
    return key;
}

// ================================================================
// Init
// ================================================================
async function init() {
    config = await apiCall('get_config');
    knownAgents = await apiCall('get_known_agents');
    isWTInstalled = await apiCall('is_wt_installed');

    applyTheme(config.theme || 'dark');

    // WT install button and recommendation
    const isEn = config.lang === 'en';
    const wtBtn = document.getElementById('wt-install-btn');
    const wtLabel = document.getElementById('wt-recommend-label');
    wtLabel.textContent = isEn ? 'Recommend: Terminal' : '推荐使用 Terminal';
    if (isWTInstalled) {
        wtBtn.style.display = 'inline-block';
        wtBtn.textContent = isEn ? 'Terminal Installed' : '已安装 Terminal';
        wtBtn.disabled = true;
        wtBtn.style.opacity = '0.5';
        wtBtn.style.cursor = 'default';
    } else {
        wtBtn.style.display = 'inline-block';
        wtBtn.textContent = isEn ? 'Install Terminal' : '安装 Terminal';
        wtBtn.style.borderColor = 'var(--primary)';
        wtBtn.style.background = 'var(--primary)';
        wtBtn.style.color = '#fff';
        // Gray out the Terminal tab and switch to PowerShell
        document.getElementById('tab-wt').classList.remove('active');
        document.getElementById('tab-wt').style.opacity = '0.35';
        document.getElementById('tab-wt').style.pointerEvents = 'none';
        document.getElementById('tab-ps').classList.add('active');
        if (config.default_launcher === 'Windows Terminal') {
            config.default_launcher = 'PowerShell';
            await apiCall('set_default_launcher', 'PowerShell');
        }
    }

    // Set active tab based on config
    document.querySelectorAll('#tab-bar button').forEach(btn => {
        if (btn.dataset.launcher !== 'Windows Terminal' || isWTInstalled) {
            btn.classList.toggle('active', btn.dataset.launcher === config.default_launcher);
        }
    });

    if (config.lang === 'en') { setEnglish(); }
    renderTable();
}

// ================================================================
// i18n
// ================================================================
function setEnglish() {
    document.getElementById('app-title').textContent = 'AgentCLI';
    document.getElementById('launcher-label').textContent = 'Select Launcher:';
    document.getElementById('settings-text').textContent = 'Settings';
    document.getElementById('btn-add').textContent = 'Add';
    document.getElementById('btn-edit').textContent = 'Edit';
    document.getElementById('btn-delete').textContent = 'Delete';
    document.getElementById('btn-up').textContent = 'Up';

// ================================================================
// Table Render
// ================================================================
function renderTable(filter) {
    const tbody = document.getElementById('table-body');
    const empty = document.getElementById('empty-state');
    const container = document.getElementById('table-container');

    let projects = config.projects;
    if (filter) {
        const q = filter.toLowerCase();
        projects = projects.filter(p =>
            p.name.toLowerCase().includes(q) || p.command.toLowerCase().includes(q));
    }

    if (projects.length === 0) {
        tbody.innerHTML = '';
        container.style.display = 'none';
        empty.classList.remove('hidden');
        return;
    }

    container.style.display = '';
    empty.classList.add('hidden');

    tbody.innerHTML = projects.map((p, i) => {
        const cmd = p.command || '';
        const cmdBase = cmd.split(' ')[0].toLowerCase();
        const agent = knownAgents[cmdBase] || null;
        const isEn = config.lang === 'en';
        const btnLaunch = isEn ? 'Launch' : '启动';
        const btnUninstall = isEn ? 'Uninstall' : '卸载';
        const btnConfig = isEn ? 'Edit Config' : '编辑配置';
        const btnFolder = isEn ? 'Folder' : '文件夹';

        const configHtml = agent && agent.config
            ? `<div class="config-btns">
                <button onclick="event.stopPropagation(); openConfig(${i})">${btnConfig}</button>
                <button onclick="event.stopPropagation(); openConfigFolder(${i})">${btnFolder}</button>
               </div>`
            : '<span style="color:var(--text-dim);font-size:12px;">-</span>';

        return `<tr class="${i === selectedIdx ? 'selected' : ''}" onclick="selectRow(${i}, event)" ondblclick="runProject(${i})">
            <td>${esc(p.name)}</td>
            <td><span class="cmd-text">${esc(cmd)}</span></td>
            <td>${configHtml}</td>
            <td>
                <button style="border:1px solid var(--success);background:var(--success);color:#fff;font:inherit;font-size:11px;padding:4px 14px;border-radius:4px;cursor:pointer;white-space:nowrap;margin-right:10px;min-width:54px;" onclick="event.stopPropagation(); runProject(${i})">${btnLaunch}</button>
                <button style="border:1px solid var(--danger);background:var(--danger);color:#fff;font:inherit;font-size:11px;padding:4px 14px;border-radius:4px;cursor:pointer;white-space:nowrap;min-width:54px;" onclick="event.stopPropagation(); uninstallProject(${i})">${btnUninstall}</button>
            </td>
        </tr>`;
    }).join('');
}

function esc(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}

function filterProjects() {
    const q = document.getElementById('search-input').value;
    renderTable(q);
}

function selectRow(idx, e) {
    selectedIdx = idx;
    config.projects.forEach((_, i) => {
        const row = document.getElementById('table-body').children[i];
        if (row) row.classList.toggle('selected', i === idx);
    });
}

// ================================================================
// Tab Bar — Launcher Selection
// ================================================================
document.getElementById('tab-bar').addEventListener('click', async (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    const launcher = e.target.dataset.launcher;
    config.default_launcher = launcher;
    document.querySelectorAll('#tab-bar button').forEach(b =>
        b.classList.toggle('active', b.dataset.launcher === launcher));
    await apiCall('set_default_launcher', launcher);
});

// ================================================================
// Toolbar Actions
// ================================================================
async function runProject(idx) {
    if (idx == null) idx = selectedIdx;
    if (idx < 0 || idx >= config.projects.length) {
        showToast('请先选择一个项目', 'warning'); return;
    }
    await apiCall('run_project', idx);
}

async function openAddDialog() {
    editIdx = -1;
    knownAgents = await apiCall('get_known_agents');
    const isEn = config.lang === 'en';
    document.getElementById('dlg-title').textContent = isEn ? 'Add Project' : '添加项目';
    document.getElementById('dlg-name').value = '';
    document.getElementById('dlg-cmd').value = '';
    document.getElementById('dlg-name').placeholder = isEn ? 'Agent name...' : 'Agent 名称...';
    document.getElementById('dlg-cmd').placeholder = isEn ? 'e.g.: claude' : '例如: claude';
    document.getElementById('dlg-label-name').textContent = isEn ? 'Name' : '名称';
    document.getElementById('dlg-label-cmd').textContent = isEn ? 'Command' : '启动命令';
    document.getElementById('dlg-btn-ok').textContent = isEn ? 'OK' : '确定';
    document.getElementById('dlg-btn-cancel').textContent = isEn ? 'Cancel' : '取消';
    renderInstallTable();
    document.getElementById('dlg-project').classList.remove('hidden');
}

async function openEditDialog() {
    if (selectedIdx < 0) { showToast(config.lang === 'en' ? 'Please select a project first' : '请先选择一个项目', 'warning'); return; }
    editIdx = selectedIdx;
    knownAgents = await apiCall('get_known_agents');
    const isEn = config.lang === 'en';
    const p = config.projects[selectedIdx];
    document.getElementById('dlg-title').textContent = isEn ? 'Edit Project' : '编辑项目';
    document.getElementById('dlg-label-name').textContent = isEn ? 'Name' : '名称';
    document.getElementById('dlg-label-cmd').textContent = isEn ? 'Command' : '启动命令';
    document.getElementById('dlg-name').value = p.name;
    document.getElementById('dlg-cmd').value = p.command;
    document.getElementById('dlg-btn-ok').textContent = isEn ? 'OK' : '确定';
    document.getElementById('dlg-btn-cancel').textContent = isEn ? 'Cancel' : '取消';
    renderInstallTable();
    document.getElementById('dlg-project').classList.remove('hidden');
}

async function saveProject() {
    const isEn = config.lang === 'en';
    const name = document.getElementById('dlg-name').value.trim();
    const cmd = document.getElementById('dlg-cmd').value.trim();
    if (!name || !cmd) { showToast(isEn ? 'Name and command cannot be empty' : '名称和命令不能为空', 'warning'); return; }

    if (editIdx >= 0) {
        config = await apiCall('edit_project', editIdx, name, cmd);
    } else {
        config = await apiCall('add_project', name, cmd);
    }
    closeDialog('dlg-project');
    renderTable();
}

async function deleteProject() {
    const isEn = config.lang === 'en';
    if (selectedIdx < 0) { showToast(isEn ? 'Please select a project first' : '请先选择一个项目', 'warning'); return; }
    const name = config.projects[selectedIdx].name;
    const msg = isEn ? `Delete '${name}'?` : `确定删除 '${name}' 吗?`;
    if (!confirm(msg)) return;
    config = await apiCall('delete_project', selectedIdx);
    if (selectedIdx >= config.projects.length) selectedIdx = config.projects.length - 1;
    renderTable();
}

async function moveUp() {
    if (selectedIdx <= 0) return;
    config = await apiCall('move_up', selectedIdx);
    selectedIdx--;
    renderTable();
}

async function moveDown() {
    if (selectedIdx < 0 || selectedIdx >= config.projects.length - 1) return;
    config = await apiCall('move_down', selectedIdx);
    selectedIdx++;
    renderTable();
}

async function openConfig(idx) {
    await apiCall('open_config', idx);
}

async function openConfigFolder(idx) {
    await apiCall('open_config_folder', idx);
}

async function uninstallProject(idx) {
    const isEn = config.lang === 'en';
    const p = config.projects[idx];
    const msg = isEn ? `Uninstall ${p.name}?` : `确定要卸载 ${p.name} 吗?`;
    if (!confirm(msg)) return;
    await apiCall('uninstall_project', idx);
    setTimeout(async () => {
        config = await apiCall('get_config');
        knownAgents = await apiCall('get_known_agents');
        renderTable();
    }, 3000);
}

// ================================================================
// Install Table (in Add/Edit Dialog)
// ================================================================
function renderInstallTable() {
    const isEn = config.lang === 'en';
    const lblInstalled = isEn ? 'Installed' : '已安装';
    const lblNotInstalled = isEn ? 'Not installed' : '未安装';
    const lblInstall = isEn ? 'Install' : '安装';
    const lblCopy = isEn ? 'Copy' : '复制';
    const lblName = isEn ? 'Name' : '名称';
    const lblType = isEn ? 'Type' : '方式';
    const lblOfficial = isEn ? 'Official' : '官方源';
    const lblMirror = isEn ? 'Mirror' : '镜像源';
    const lblStatus = isEn ? 'Status' : '状态';

    // Update install table headers
    const rows = document.querySelectorAll('#install-table-body').length;
    let ths = document.querySelectorAll('#install-table-head th');
    if (ths.length) {
        ths[0].textContent = lblName;
        ths[1].textContent = lblType;
        ths[2].textContent = lblOfficial;
        ths[3].textContent = lblMirror;
        ths[4].textContent = lblStatus;
    }

    const tbody = document.getElementById('install-table-body');
    tbody.innerHTML = Object.entries(knownAgents).map(([cmd, info]) => {
        const installed = info.installed;
        const statusHtml = installed
            ? `<span class="status-ok">&#10004; ${lblInstalled}</span>`
            : `<span class="status-no">&#10008; ${lblNotInstalled}</span>`;

        return `<tr>
            <td style="font-weight:600">${esc(info.name)}</td>
            <td>${esc(info.type)}</td>
            <td>
                <div class="btn-group">
                    ${installed
                        ? '<button disabled>' + lblInstalled + '</button>'
                        : `<button class="install-official" onclick="doInstall('${cmd}','official')">${lblInstall}</button>`}
                    <button onclick="doCopy('${cmd}','official')">${lblCopy}</button>
                </div>
            </td>
            <td>
                <div class="btn-group">
                    ${info.mirror ? (installed
                        ? '<button disabled>' + lblInstalled + '</button>'
                        : `<button class="install-mirror" onclick="doInstall('${cmd}','mirror')">${lblInstall}</button>`)
                        : '<span style="color:var(--text-dim)">-</span>'}
                    ${info.mirror ? '<button onclick="doCopy(\''+cmd+'\',\'mirror\')">' + lblCopy + '</button>' : ''}
                </div>
            </td>
            <td>${statusHtml}</td>
        </tr>`;
    }).join('');
}

async function doInstall(cmd, source) {
    const isEn = config.lang === 'en';
    showToast(isEn ? 'Installing...' : '安装中...', 'info');
    await apiCall('install_agent', cmd, source);
    pollInstall(cmd, 0);
}

function pollInstall(cmd, elapsed) {
    const isEn = config.lang === 'en';
    if (elapsed > 300) {
        showToast(isEn ? 'Installation timeout, check terminal' : '安装超时，请检查终端窗口', 'warning');
        return;
    }
    setTimeout(async () => {
        knownAgents = await apiCall('get_known_agents');
        renderInstallTable();
        if (knownAgents[cmd] && knownAgents[cmd].installed) {
            showToast(esc(knownAgents[cmd].name) + (isEn ? ' installed' : ' 安装完成'), 'success');
            config = await apiCall('get_config');
            renderTable();
        } else {
            pollInstall(cmd, elapsed + 2);
        }
    }, 2000);
}

async function doCopy(cmd, source) {
    const isEn = config.lang === 'en';
    await apiCall('copy_command', cmd, source);
    showToast(isEn ? 'Copied to clipboard' : '命令已复制到剪贴板', 'success');
}

async function doDetect() {
    const isEn = config.lang === 'en';
    config = await apiCall('detect');
    knownAgents = await apiCall('get_known_agents');
    renderTable();
    showToast(isEn ? 'Detection complete' : '检测完成', 'success');
}

// ================================================================
// Settings Dialog
// ================================================================
async function openSettings() {
    const isEn = config.lang === 'en';
    const ver = await apiCall('get_version');
    document.getElementById('settings-ver').textContent = ver;
    document.getElementById('settings-theme').value = config.theme || 'dark';
    document.getElementById('settings-lang').value = config.lang || 'zh';
    document.getElementById('dlg-settings-title').textContent = isEn ? 'Settings' : '设置';
    document.getElementById('settings-h-theme').textContent = isEn ? 'Theme' : '主题';
    document.getElementById('settings-h-lang').textContent = isEn ? 'Language' : '语言';
    document.getElementById('settings-h-ver').textContent = isEn ? 'Version' : '版本';
    document.getElementById('settings-ver-label').textContent = isEn ? 'Current: v' : '当前版本: v';
    document.getElementById('settings-theme-opt1').textContent = isEn ? 'Dark' : '深色';
    document.getElementById('settings-theme-opt2').textContent = isEn ? 'Light' : '浅色';
    document.getElementById('settings-lang-opt1').textContent = isEn ? 'Chinese' : '中文';
    document.getElementById('settings-lang-opt2').textContent = isEn ? 'English' : 'English';
    document.getElementById('settings-check-update').textContent = isEn ? 'Check Update' : '检查更新';
    document.getElementById('settings-btn-cancel').textContent = isEn ? 'Cancel' : '取消';
    document.getElementById('settings-btn-save').textContent = isEn ? 'Save' : '保存';
    document.getElementById('dlg-settings').classList.remove('hidden');
}

async function saveSettings() {
    const theme = document.getElementById('settings-theme').value;
    const lang = document.getElementById('settings-lang').value;
    const isEn = lang === 'en';
    await apiCall('save_settings', theme, lang);
    applyTheme(theme);
    config.theme = theme;
    config.lang = lang;
    closeDialog('dlg-settings');
    if (isEn) { setEnglish(); } else { setChinese(); }
    showToast(isEn ? 'Settings saved' : '设置已保存', 'success');
}

async function checkUpdate() {
    const isEn = config.lang === 'en';
    const result = await apiCall('check_update');
    if (result && result.version) {
        const msg = isEn
            ? `New version: v${result.version}\nGo to download?`
            : `发现新版本: v${result.version}\n是否前往下载?`;
        if (confirm(msg)) {
            await apiCall('open_url', result.url);
        }
    } else {
        showToast(isEn ? 'Already up to date' : '已是最新版本', 'info');
    }
}

// ================================================================
// Dialog Helpers
// ================================================================
function closeDialog(id) {
    document.getElementById(id).classList.add('hidden');
}

// ================================================================
// Keyboard Shortcuts
// ================================================================
document.addEventListener('keydown', (e) => {
    if (document.querySelector('.modal-overlay:not(.hidden)')) return; // Don't fire when dialog open
    if (e.target.tagName === 'INPUT') return;

    switch (e.key) {
        case 'ArrowUp': if (selectedIdx > 0) selectRow(selectedIdx - 1); e.preventDefault(); break;
        case 'ArrowDown': if (selectedIdx < config.projects.length - 1) selectRow(selectedIdx + 1); e.preventDefault(); break;
        case 'Enter': runProject(); e.preventDefault(); break;
        case 'Delete': deleteProject(); e.preventDefault(); break;
        case 'n': case 'N': if (e.ctrlKey) { openAddDialog(); e.preventDefault(); } break;
        case 'f': case 'F': if (e.ctrlKey) { document.getElementById('search-input').focus(); e.preventDefault(); } break;
        case 'F5': doDetect(); e.preventDefault(); break;
    }
});

// ================================================================
// Startup — wait for pywebview bridge
// ================================================================
if (window.pywebview && window.pywebview.api) {
    init();
} else {
    window.addEventListener('pywebviewready', init);
}
</script>
